name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: cd sdk && npm ci

      - name: Build
        run: cd sdk && npm run build

      - name: Run tests
        run: cd sdk && npm test

      - name: Verify CLI
        run: node sdk/dist/cli/index.mjs version

      - name: Verify dist output
        run: |
          test -f sdk/dist/index.js || (echo "Missing dist/index.js" && exit 1)
          test -f sdk/dist/index.mjs || (echo "Missing dist/index.mjs" && exit 1)
          test -f sdk/dist/index.d.ts || (echo "Missing dist/index.d.ts" && exit 1)
          test -f sdk/dist/headless/index.js || (echo "Missing headless" && exit 1)
          test -f sdk/dist/micro/index.js || (echo "Missing micro" && exit 1)
          test -f sdk/dist/cli/index.mjs || (echo "Missing CLI" && exit 1)
          echo "✓ All dist files present"

  publish:
    name: Publish to npm
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: cd sdk && npm ci

      - name: Build
        run: cd sdk && npm run build

      - name: Check if version changed
        id: version
        run: |
          CURRENT=$(node -p "require('./sdk/package.json').version")
          PUBLISHED=$(npm view @gatex402/checkout version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT" != "$PUBLISHED" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Version changed: $PUBLISHED → $CURRENT"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version unchanged: $CURRENT"
          fi

      - name: Publish
        if: steps.version.outputs.changed == 'true'
        run: cd sdk && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
